name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main        # Kiekvienas push į main atnaujina frontend
  workflow_dispatch: # Rankinis paleidimas iš GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is NOT set!"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN is set"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID secret is NOT set!"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID is set"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: |
          npm run build
          cp -r functions dist/
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.x'
          command: pages deploy dist --project-name=armamods-leaderboard --commit-dirty=true
          workingDirectory: web
