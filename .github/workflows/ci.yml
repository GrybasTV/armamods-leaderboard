name: 🛡️ Continuous Ingestion & Quality CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Type Check (TypeScript Lint)
        run: npx tsc --noEmit

      - name: 🧪 Run Automated Unit Tests
        run: npx tsx --test test/utils.test.ts
