name = "armamods-leaderboard"
main = "worker-src/index.ts"
compatibility_date = "2024-03-24"

# Node configuration for Worker is in main property

# KV for trending snapshots
[[kv_namespaces]]
binding = "TRENDING_KV"
id = "a8f21c595e39452e95e7e41e3d812013"
preview_id = "0a5d2870e2114b1783fb607c35d78751"

# Env vars
[vars]
ENVIRONMENT = "production"

# Webhook secret (Set this in Cloudflare Dashboard or via 'wrangler secret put WEBHOOK_SECRET')
WEBHOOK_SECRET = "REPLACE_WITH_SECRET"

